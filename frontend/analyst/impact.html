<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relatório de Impacto — TerraPilot Analista</title>
  <meta name="theme-color" content="#2D5F3F">
  <link rel="stylesheet" href="css/analyst.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <a href="#main" class="skip-link">Pular para o conteúdo</a>
  <button type="button" id="mobile-nav-toggle" class="mobile-nav-toggle" aria-label="Abrir menu"></button>

  <div class="app-layout">
    <aside id="sidebar" class="sidebar" aria-label="Barra lateral"></aside>
    <div class="main-wrapper">
      <main id="main" class="main-content" tabindex="-1">
        <header class="page-header">
          <div>
            <h1>Relatório de impacto</h1>
            <p class="page-header__meta">O valor do seu trabalho para produtores e meio ambiente</p>
          </div>
          <div class="period-selector" role="group" aria-label="Selecionar período">
            <button type="button" class="btn btn--ghost" data-period="7">Última semana</button>
            <button type="button" class="btn btn--ghost active" data-period="30">Último mês</button>
            <button type="button" class="btn btn--ghost" data-period="90">Trimestre</button>
            <button type="button" class="btn btn--secondary" id="btn-export-pdf">Exportar PDF</button>
          </div>
        </header>

        <div id="impact-loading" class="loading"><div class="loading__spinner"></div> Gerando relatório...</div>

        <div id="impact-metrics"></div>
        <div id="impact-narrative"></div>

        <div class="dashboard-grid--bottom" style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:24px;">
          <section class="panel" aria-labelledby="stories-title">
            <h2 class="panel__title" id="stories-title">Top 3 histórias de sucesso</h2>
            <div id="success-stories"></div>
          </section>
          <section class="panel" aria-labelledby="comparison-title">
            <h2 class="panel__title" id="comparison-title">Comparação com média estadual</h2>
            <div id="peer-comparison"></div>
          </section>
        </div>
      </main>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/router.js"></script>
  <script src="js/impact.js"></script>
</body>
</html>
