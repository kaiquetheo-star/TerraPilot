<div class="modal-overlay" id="notification-modal" hidden role="dialog" aria-modal="true" aria-labelledby="notification-modal-title">
  <div class="modal">
    <div class="modal__header">
      <h2 id="notification-modal-title">{{title}}</h2>
      <button type="button" class="modal__close" data-close-modal aria-label="Fechar">×</button>
    </div>
    <div class="modal__body">{{content}}</div>
    <div class="modal__footer">
      <button type="button" class="btn btn--ghost" data-close-modal>Fechar</button>
      <button type="button" class="btn btn--primary" id="btn-copy-whatsapp">Copiar para WhatsApp</button>
    </div>
  </div>
</div>
