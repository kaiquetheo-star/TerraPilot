<article class="panel case-card" data-case-id="{{case_id}}">
  <header style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
    <h3 style="margin:0;">{{producer_name}}</h3>
    {{priority_badge}}
  </header>
  <p class="page-header__meta">{{municipality}} · {{issue_label}}</p>
  <p style="font-size:13px;margin-top:8px;">{{recommended_action}}</p>
</article>
