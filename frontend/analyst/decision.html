<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suporte de Decisão — TerraPilot Analista</title>
  <meta name="theme-color" content="#2D5F3F">
  <link rel="stylesheet" href="css/analyst.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <a href="#main" class="skip-link">Pular para o conteúdo</a>
  <button type="button" id="mobile-nav-toggle" class="mobile-nav-toggle" aria-label="Abrir menu"></button>

  <div class="app-layout">
    <aside id="sidebar" class="sidebar" aria-label="Barra lateral"></aside>
    <div class="main-wrapper">
      <main id="main" class="main-content" tabindex="-1">
        <header class="page-header">
          <div>
            <h1>Suporte de decisão</h1>
            <p class="page-header__meta">Opções legais para casos complexos</p>
          </div>
        </header>

        <div class="disclaimer" role="note">
          <strong>A decisão final é da analista</strong> — o sistema apenas apresenta opções legais, riscos e precedentes para apoiar sua análise.
        </div>

        <div class="decision-layout">
          <section class="panel" aria-labelledby="form-title">
            <h2 class="panel__title" id="form-title">Dados do caso</h2>
            <form id="decision-form">
              <div class="form-group">
                <label for="producer_name">Nome do produtor</label>
                <input type="text" id="producer_name" name="producer_name" required value="Seu Raimundo">
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label for="property_size_ha">Tamanho (ha)</label>
                  <input type="number" id="property_size_ha" name="property_size_ha" required min="0.1" step="0.1" value="30">
                </div>
                <div class="form-group">
                  <label for="property_size_modulos">Módulos fiscais</label>
                  <input type="number" id="property_size_modulos" name="property_size_modulos" required min="0.1" step="0.1" value="1">
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label for="municipality">Município</label>
                  <input type="text" id="municipality" name="municipality" required value="Itaberaba">
                </div>
                <div class="form-group">
                  <label for="state">Estado</label>
                  <input type="text" id="state" name="state" required maxlength="2" value="BA">
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label for="biome">Bioma</label>
                  <select id="biome" name="biome" required>
                    <option value="Caatinga" selected>Caatinga</option>
                    <option value="Cerrado">Cerrado</option>
                    <option value="Amazônia">Amazônia</option>
                    <option value="Mata Atlântica">Mata Atlântica</option>
                    <option value="Pampa">Pampa</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="issue_code">Tipo de erro</label>
                  <select id="issue_code" name="issue_code" required>
                    <option value="APP_RIVER_WIDTH" selected>APP de rio</option>
                    <option value="RL_PERCENTAGE">Reserva Legal (%)</option>
                    <option value="RL_OVERLAP_UC">RL sobrepõe UC</option>
                    <option value="CONSOLIDATED_APP">APP consolidada</option>
                    <option value="PRA_PENDING">PRA pendente</option>
                  </select>
                </div>
              </div>
              <fieldset style="border:none;padding:0;margin:16px 0;">
                <legend style="font-weight:600;margin-bottom:8px;">Sobreposições e multas</legend>
                <div class="form-check">
                  <input type="checkbox" id="overlaps-uc" name="overlaps_uc">
                  <label for="overlaps-uc">Sobrepõe Unidade de Conservação</label>
                </div>
                <div class="form-group" id="uc-type-group" hidden>
                  <label for="uc_type">Tipo de UC</label>
                  <select id="uc_type" name="uc_type">
                    <option value="protecao_integral">Proteção integral</option>
                    <option value="uso_sustentavel">Uso sustentável</option>
                  </select>
                </div>
                <div class="form-check">
                  <input type="checkbox" id="overlaps_ti" name="overlaps_ti">
                  <label for="overlaps_ti">Sobrepõe Terra Indígena</label>
                </div>
                <div class="form-check">
                  <input type="checkbox" id="has-fines" name="has_fines">
                  <label for="has-fines">Tem multas pendentes</label>
                </div>
                <div class="form-group" id="fines-count-group" hidden>
                  <label for="fine_count">Quantidade de multas</label>
                  <input type="number" id="fine_count" name="fine_count" min="0" value="1">
                </div>
                <div class="form-check">
                  <input type="checkbox" id="consolidated_before_2008" name="consolidated_before_2008" checked>
                  <label for="consolidated_before_2008">Área consolidada antes de 22/07/2008</label>
                </div>
              </fieldset>
              <div class="form-group">
                <label for="legal_issues">Artigos aplicáveis (separados por vírgula)</label>
                <input type="text" id="legal_issues" name="legal_issues" value="Art. 4º, Art. 61-A">
              </div>
              <button type="submit" class="btn btn--primary">Analisar caso</button>
            </form>
          </section>

          <section class="panel" id="decision-results" hidden aria-live="polite">
            <p class="page-header__meta">Preencha o formulário e clique em Analisar caso.</p>
          </section>
        </div>
      </main>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/router.js"></script>
  <script src="js/decision.js"></script>
</body>
</html>
