  <div class="card">
    <div class="form-group">
      <label class="form-label" for="first-name">Seu nome</label>
      <input type="text" id="first-name" class="form-control" placeholder="Ex: Seu Raimundo">
    </div>
    <div class="form-group">
      <label class="form-label" for="first-municipality">Município</label>
      <input type="text" id="first-municipality" class="form-control" placeholder="Ex: Lucas do Rio Verde">

    <button type="button" id="btn-first-gps" class="btn btn--secondary">📍 Usar GPS</button>
    <p id="first-gps-coords" class="text-muted mt-2 hidden"></p>
    <button type="button" id="btn-first-guide" class="btn btn--primary mt-2">Começar guia</button>
  </div>

  <div id="first-declaration-content"></div>
