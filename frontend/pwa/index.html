<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TerraPilot - Cadastro Rural</title>
    
    <meta name="theme-color" content="#10b981">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        .status-offline { background-color: #ef4444; }
        .status-online { background-color: #10b981; }
        .pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-gray-900 text-white">
    
    <div id="status-bar" class="fixed top-0 left-0 right-0 p-2 text-center text-sm font-bold z-50 status-offline">
        🔴 OFFLINE - Dados serão salvos localmente
    </div>
    
    <div class="container mx-auto px-4 pt-16 pb-20">
        
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-green-400 mb-2">🌱 TerraPilot</h1>
            <p class="text-gray-400">Cadastro Ambiental Rural</p>
        </header>
        
        <form id="car-form" class="space-y-6">
            
            <div>
                <label class="block text-lg font-semibold mb-2">ID do Produtor</label>
                <input 
                    type="text" 
                    id="farmer-id"
                    required
                    class="w-full p-4 text-xl bg-gray-800 border-2 border-gray-700 rounded-lg focus:border-green-500 focus:outline-none"
                    placeholder="Ex: raimundo_001"
                >
            </div>
            
            <div>
                <label class="block text-lg font-semibold mb-2">Área (hectares)</label>
                <input 
                    type="number" 
                    id="area-ha"
                    step="0.1"
                    required
                    class="w-full p-4 text-xl bg-gray-800 border-2 border-gray-700 rounded-lg focus:border-green-500 focus:outline-none"
                    placeholder="Ex: 50"
                >
            </div>
            
            <div>
                <label class="block text-lg font-semibold mb-2">Tipo de Vegetação</label>
                <select 
                    id="vegetation-type"
                    required
                    class="w-full p-4 text-xl bg-gray-800 border-2 border-gray-700 rounded-lg focus:border-green-500 focus:outline-none"
                >
                    <option value="">Selecione...</option>
                    <option value="Cerrado">Cerrado</option>
                    <option value="Amazônia">Amazônia</option>
                    <option value="Mata Atlântica">Mata Atlântica</option>
                    <option value="Caatinga">Caatinga</option>
                    <option value="Pampa">Pampa</option>
                    <option value="Pantanal">Pantanal</option>
                </select>
            </div>
            
            <div>
                <label class="block text-lg font-semibold mb-2">Coordenadas GPS</label>
                <button 
                    type="button"
                    id="get-gps-btn"
                    class="w-full p-4 text-xl bg-blue-600 hover:bg-blue-700 rounded-lg font-bold mb-2"
                >
                    📍 Capturar Localização Atual
                </button>
                <div id="gps-display" class="p-4 bg-gray-800 rounded-lg text-gray-400">
                    Aguardando captura...
                </div>
                <input type="hidden" id="gps-lat">
                <input type="hidden" id="gps-lng">
            </div>
            
            <div>
                <label class="block text-lg font-semibold mb-2">Fotos da Propriedade</label>
                <input 
                    type="file" 
                    id="photos"
                    multiple
                    accept="image/*"
                    capture="environment"
                    class="w-full p-4 bg-gray-800 border-2 border-gray-700 rounded-lg"
                >
                <p class="text-sm text-gray-500 mt-2">Tire fotos da vegetação, nascentes, etc.</p>
            </div>
            
            <div>
                <label class="block text-lg font-semibold mb-2">Observações</label>
                <textarea 
                    id="notes"
                    rows="4"
                    class="w-full p-4 text-lg bg-gray-800 border-2 border-gray-700 rounded-lg focus:border-green-500 focus:outline-none"
                    placeholder="Informações adicionais sobre a propriedade..."
                ></textarea>
            </div>
            
            <button 
                type="submit"
                class="w-full p-6 text-2xl bg-green-600 hover:bg-green-700 rounded-lg font-bold shadow-lg"
            >
                💾 Salvar Cadastro
            </button>
            
        </form>
        
        <div id="pending-count" class="mt-8 p-4 bg-yellow-600 rounded-lg text-center hidden">
            <p class="text-lg font-bold">
                📋 <span id="count-number">0</span> cadastros aguardando sincronização
            </p>
            <button 
                id="sync-btn"
                class="mt-4 w-full p-4 bg-white text-yellow-600 rounded-lg font-bold"
            >
                🔄 Sincronizar Agora
            </button>
        </div>
        
    </div>
    
    <div id="toast" class="fixed bottom-4 left-4 right-4 p-4 bg-gray-800 rounded-lg shadow-lg hidden z-50">
        <p id="toast-message"></p>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
