<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TerraPilot - Dashboard de Validação</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    
    <!-- Header -->
    <header class="bg-gray-900 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold">🌱 TerraPilot</h1>
                <p class="text-sm text-gray-400">Dashboard de Validação Ambiental</p>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-sm">👩‍💼 Analista: Luana Silva</span>
                <div class="w-10 h-10 bg-green-600 rounded-full flex items-center justify-center font-bold">LS</div>
            </div>
        </div>
    </header>
    
    <div class="container mx-auto p-6">
        
        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white p-6 rounded-lg shadow">
                <p class="text-gray-600 text-sm">Pendentes</p>
                <p class="text-3xl font-bold text-yellow-600" id="stat-pending">0</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow">
                <p class="text-gray-600 text-sm">Aprovados Hoje</p>
                <p class="text-3xl font-bold text-green-600" id="stat-approved">0</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow">
                <p class="text-gray-600 text-sm">Rejeitados Hoje</p>
                <p class="text-3xl font-bold text-red-600" id="stat-rejected">0</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow">
                <p class="text-gray-600 text-sm">Tempo Médio</p>
                <p class="text-3xl font-bold text-blue-600" id="stat-time">2.3min</p>
            </div>
        </div>
        
        <!-- Filtros -->
        <div class="bg-white p-4 rounded-lg shadow mb-6">
            <div class="flex gap-4 flex-wrap">
                <button class="filter-btn active px-4 py-2 bg-blue-600 text-white rounded" data-filter="all">
                    Todos
                </button>
                <button class="filter-btn px-4 py-2 bg-gray-200 text-gray-700 rounded" data-filter="pending">
                    ⏳ Pendentes
                </button>
                <button class="filter-btn px-4 py-2 bg-gray-200 text-gray-700 rounded" data-filter="approved">
                    ✅ Aprovados
                </button>
                <button class="filter-btn px-4 py-2 bg-gray-200 text-gray-700 rounded" data-filter="rejected">
                    ❌ Rejeitados
                </button>
            </div>
        </div>
        
        <!-- Tabela de Submissões -->
        <div class="bg-white rounded-lg shadow overflow-hidden">
            <table class="w-full">
                <thead class="bg-gray-50 border-b">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Produtor</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Área (ha)</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Vegetação</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Confiança IA</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Ações</th>
                    </tr>
                </thead>
                <tbody id="submissions-table" class="divide-y divide-gray-200">
                    <!-- Populado via JavaScript -->
                </tbody>
            </table>
        </div>
        
    </div>
    
    <!-- Modal de Detalhes -->
    <div id="detail-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-lg max-w-2xl w-full max-h-[90vh] overflow-y-auto">
            <div class="p-6">
                <div class="flex justify-between items-start mb-4">
                    <h2 class="text-2xl font-bold">Detalhes da Submissão</h2>
                    <button id="close-modal" class="text-gray-500 hover:text-gray-700 text-2xl">&times;</button>
                </div>
                
                <div id="modal-content">
                    <!-- Conteúdo dinâmico -->
                </div>
                
                <div class="flex gap-4 mt-6">
                    <button id="approve-btn" class="flex-1 p-3 bg-green-600 text-white rounded-lg font-bold hover:bg-green-700">
                        ✅ Aprovar Cadastro
                    </button>
                    <button id="reject-btn" class="flex-1 p-3 bg-red-600 text-white rounded-lg font-bold hover:bg-red-700">
                        ❌ Rejeitar Cadastro
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="dashboard.js"></script>
</body>
</html>
